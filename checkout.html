<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - SEAPEDIA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/checkout.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="navbar-brand">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                SEAPEDIA
            </a>
            <div class="nav-actions" id="nav-links">
                <!-- Injected via JS -->
            </div>
        </div>
    </nav>

    <main class="container mb-4 mt-4">
        <h1 class="mb-4">Checkout</h1>
        <div class="checkout-grid" style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px; align-items: start;">
            <!-- Order Summary -->
            <div>
                <div class="checkout-card" style="background: white; padding: 24px; border-radius: 16px; box-shadow: var(--box-shadow);">
                    <h2 class="section-title mb-3">Order Items</h2>
                    <div id="checkout-items-list">
                        <!-- Items injected here -->
                    </div>
                </div>
            </div>
            
            <!-- Payment & Summary -->
            <div>
                <div class="checkout-card" style="background: white; padding: 24px; border-radius: 16px; box-shadow: var(--box-shadow); position: sticky; top: 100px;">
                    <h2 class="section-title mb-3">Payment Details</h2>
                    <div class="form-group">
                        <label>Payment Method</label>
                        <select id="payment-method" class="form-control">
                            <option value="wallet">SEAPay (Balance: <span id="checkout-wallet-balance">Rp 0</span>)</option>
                            <option value="transfer">Bank Transfer</option>
                            <option value="cod">Cash on Delivery</option>
                        </select>
                    </div>
                    
                    <div class="summary-row flex justify-between mb-2">
                        <span class="text-muted">Subtotal</span>
                        <span id="checkout-subtotal" style="font-weight: 600;">Rp 0</span>
                    </div>
                    <div class="summary-row flex justify-between mb-2">
                        <span class="text-muted">Delivery Fee</span>
                        <span id="checkout-delivery" style="font-weight: 600;">Rp 10,000</span>
                    </div>
                    <hr class="my-3">
                    <div class="summary-row flex justify-between mb-2">
                        <strong>Total Payment</strong>
                        <strong id="checkout-total" style="color: var(--primary-color); font-size: 18px;">Rp 0</strong>
                    </div>
                    
                    <button class="btn btn-primary mt-4" style="width: 100%; height: 48px; font-size: 16px;" onclick="processCheckout()">Confirm & Pay</button>
                </div>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>
    <script src="js/style.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
