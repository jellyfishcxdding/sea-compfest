<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - SEAPEDIA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/checkout.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="navbar-brand">SEAPEDIA Checkout</a>
            <div class="nav-actions" id="nav-links" style="margin-left: auto;">
                <button class="btn btn-outline" data-href="cart.html">Back to Cart</button>
            </div>
        </div>
    </nav>

    <main class="container" style="margin-top: 24px; margin-bottom: 40px;">
        <h1 class="section-title mb-4">Checkout</h1>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;" class="checkout-layout">
            <!-- Checkout Details -->
            <div>
                <!-- Address -->
                <div class="card mb-3">
                    <h3 class="mb-2">Shipping Address</h3>
                    <p class="text-muted" style="margin-bottom:8px;"><strong>John Doe</strong> (+62 812-3456-7890)</p>
                    <p class="text-muted">Jl. Jend. Sudirman No.1, Jakarta Pusat, DKI Jakarta 10220</p>
                    <button class="btn btn-outline mt-3" style="padding: 4px 12px;">Change Address</button>
                </div>

                <!-- Product List container -->
                <div id="checkout-items-container">
                    <!-- JS renders items here -->
                </div>

                <!-- Payment Method -->
                <div class="card mb-3">
                    <h3 class="mb-3">Payment Method</h3>
                    <div style="display: flex; flex-direction: column; gap: 12px;">
                        <label style="display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer;" class="payment-option">
                            <input type="radio" name="payment_method" value="wallet" checked>
                            <span style="font-weight: 600;">SEAPEDIA Wallet</span>
                            <span style="margin-left: auto; color: var(--primary-color);" id="checkout-wallet-balance">Rp 150,000</span>
                        </label>
                        
                        <label style="display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer;" class="payment-option">
                            <input type="radio" name="payment_method" value="cod">
                            <span style="font-weight: 600;">Cash on Delivery (COD)</span>
                        </label>

                        <label style="display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer;" class="payment-option">
                            <input type="radio" name="payment_method" value="card">
                            <div style="display: flex; flex-direction: column;">
                                <span style="font-weight: 600;">Debit / Credit Card (Bank API)</span>
                                <span class="text-muted" style="font-size: 12px;">Redirects to secure Bank Gateway</span>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Summary -->
            <div>
                <div class="card" style="position: sticky; top: 80px;">
                    <h3 class="mb-3">Promo & Voucher</h3>
                    <div class="flex gap-2 mb-4">
                        <input type="text" class="form-control" placeholder="Enter code">
                        <button class="btn btn-outline">Apply</button>
                    </div>

                    <h3 class="mb-3">Payment Summary</h3>
                    <div class="flex justify-between mb-2 text-muted" style="font-size: 14px;">
                        <span>Total Price (<span id="summary-qty">0</span> items)</span>
                        <span id="summary-price">Rp 0</span>
                    </div>
                    <div class="flex justify-between mb-2 text-muted" style="font-size: 14px;">
                        <span>Delivery Fee</span>
                        <span id="summary-delivery">Rp 10,000</span>
                    </div>
                    
                    <hr style="border:none; border-top:1px dashed var(--border-color); margin: 16px 0;">
                    
                    <div class="flex justify-between mb-4">
                        <span style="font-weight:700;">Total Payment</span>
                        <span style="font-weight:700; font-size:18px; color:var(--primary-color);" id="summary-total">Rp 0</span>
                    </div>
                    
                    <button class="btn btn-primary" style="width: 100%; font-size: 16px;" id="pay-btn">Pay & Checkout</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/style.js"></script>
    <script src="js/checkout.js"></script>
    <style>
        @media (max-width: 768px) {
            .checkout-layout {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</body>
</html>
