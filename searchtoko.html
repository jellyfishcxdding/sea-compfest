<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Stores - SEAPEDIA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/searchtoko.css">
    <style>
        .store-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--box-shadow);
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border-color);
        }
        .store-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary-color);
        }
        .store-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--background-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
            color: var(--primary-color);
        }
    </style>
    <link rel="stylesheet" href="css/motion.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="navbar-brand">SEAPEDIA</a>
            <div class="search-bar">
                <input type="text" id="store-search-input" placeholder="Search for stores..." onkeyup="filterStores()">
                <button><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></button>
            </div>
            <div class="nav-actions" id="nav-links" style="margin-left: auto;">
                <button class="btn btn-outline" data-href="dashboard.html">Back to Dashboard</button>
            </div>
        </div>
    </nav>

    <main class="container" style="margin-top: 24px; margin-bottom: 40px;">
        <h1 class="section-title mb-4">Discover Stores</h1>

        <div class="grid" id="store-grid">
            <!-- Stores will be injected here by Javascript -->
        </div>
    </main>

    <script src="js/style.js"></script>
    <script src="js/searchtoko.js"></script>
    <script>
        function filterStores() {
            const input = document.getElementById('store-search-input').value.toLowerCase();
            const cards = document.getElementsByClassName('store-card');
            for (let i = 0; i < cards.length; i++) {
                const title = cards[i].querySelector('h3').innerText.toLowerCase();
                if (title.includes(input)) {
                    cards[i].style.display = 'flex';
                } else {
                    cards[i].style.display = 'none';
                }
            }
        }
    </script>
    <script src="js/motion.js"></script>
</body>
</html>
