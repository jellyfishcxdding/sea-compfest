<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Products - SEAPEDIA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body style="background: var(--background-light);">
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="navbar-brand">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                SEAPEDIA
            </a>
            
            <form class="search-bar" id="search-form" onsubmit="handleSearch(event)">
                <input type="text" id="search-input" placeholder="Search SEAPEDIA...">
                <button type="submit">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </form>

            <div class="nav-actions" id="nav-links"></div>
        </div>
    </nav>

    <div class="container mt-4 mb-4">
        <div class="flex justify-between align-center mb-4">
            <h2 id="search-results-title">Search Results</h2>
            <select id="sort-dropdown" class="form-control" style="width: 200px;" onchange="handleSortChange(this.value)">
                <option value="default">Relevance</option>
                <option value="price_asc">Price: Low to High</option>
                <option value="price_desc">Price: High to Low</option>
                <option value="rating_desc">Highest Rated</option>
            </select>
        </div>

        <div class="product-grid" id="product-list">
            <!-- Results injected here -->
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="js/style.js"></script>
    <script src="js/searchproduct.js"></script>
</body>
</html>
