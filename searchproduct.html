<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Products - SEAPEDIA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/searchproduct.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="navbar-brand">SEAPEDIA</a>
            <div class="search-bar">
                <input type="text" placeholder="Search products...">
                <button><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></button>
            </div>
            <div class="nav-actions" id="nav-links" style="margin-left: auto;">
                <button class="btn btn-outline" data-href="index.html">Back to Home</button>
            </div>
        </div>
    </nav>

    <!-- Categories -->
    <div class="category-nav">
        <div class="container">
            <ul style="list-style: none; display: flex; gap: 24px; color: var(--text-muted); font-size: 14px; overflow-x: auto; padding-bottom: 8px;">
                <li><a href="searchproduct.html?category=Electronics" style="color:inherit; text-decoration:none;">Electronics</a></li>
                <li><a href="searchproduct.html?category=Fashion" style="color:inherit; text-decoration:none;">Fashion</a></li>
                <li><a href="searchproduct.html?category=Home" style="color:inherit; text-decoration:none;">Home & Living</a></li>
                <li><a href="searchproduct.html?category=Health" style="color:inherit; text-decoration:none;">Health</a></li>
                <li><a href="searchproduct.html?category=Groceries" style="color:inherit; text-decoration:none;">Groceries</a></li>
                <li><a href="searchproduct.html?category=Automotive" style="color:inherit; text-decoration:none;">Automotive</a></li>
                <li><a href="searchproduct.html?category=Toys" style="color:inherit; text-decoration:none;">Toys & Hobbies</a></li>
            </ul>
        </div>
    </div>

    <main class="container" style="margin-top: 24px; margin-bottom: 40px;">
        <h2 class="section-title mb-4" id="category-title">All Products</h2>
        <div class="product-grid" id="product-list">
            <!-- Dynamically populated by app.js loadProducts() -->
        </div>
    </main>

    <script src="js/style.js"></script>
    <script src="js/searchproduct.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const cat = params.get('category');
            if (cat) {
                document.getElementById('category-title').innerText = `Results for: ${cat}`;
            }
            loadProducts(30); // Load 30 products for the search page
        });
    </script>
</body>
</html>
