<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Management - SEAPEDIA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sellerPage.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="navbar-brand">SEAPEDIA Seller Center</a>
            <div class="nav-actions" id="nav-links" style="margin-left: auto;">
                <button class="btn btn-outline" data-href="dashboard.html">Back to Dashboard</button>
            </div>
        </div>
    </nav>

    <main class="container" style="margin-top: 24px; margin-bottom: 40px;">
        <div class="flex justify-between align-center mb-4">
            <h1 class="section-title" style="margin: 0; font-size: 24px;">Store Management</h1>
        </div>

        <!-- Store Setup / Info -->
        <div class="card mb-4">
            <h3 class="mb-3">Store Profile</h3>
            <div id="store-info-container">
                <form id="store-form" class="flex gap-2">
                    <input type="text" id="store-name" class="form-control" placeholder="Enter unique store name..." required style="max-width: 400px;">
                    <button type="submit" class="btn btn-primary">Create Store</button>
                </form>
            </div>
        </div>

        <!-- Products -->
        <div class="card mb-4" id="seller-products-section" style="display: none;">
            <div class="flex justify-between align-center mb-3">
                <h3>My Products</h3>
                <button class="btn btn-primary" onclick="openModal('addProductModal')">+ Add Product</button>
            </div>
            <div class="product-grid" id="my-products-list">
                <p class="text-muted" style="grid-column: 1/-1;">No products found in your store.</p>
            </div>
        </div>

        <!-- Pesanan Masuk Content -->
        <div id="pesanan-masuk" class="tab-content" style="display:block;">
            <div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
                    <h3>Daftar Pesanan</h3>
                    <input type="text" class="form-control" placeholder="Cari pesanan..." style="width: 250px;">
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Produk</th>
                            <th>Total Pembayaran</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="seller-orders-tbody">
                        <!-- Injected dynamically by app.js or inline script -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add Product Modal -->
    <div class="modal-overlay" id="addProductModal">
        <div class="modal-content">
            <button onclick="closeModal('addProductModal')" style="position:absolute; right:16px; top:16px; background:none; border:none; font-size:20px; cursor:pointer;">&times;</button>
            <h2 class="mb-3">Add New Product</h2>
            <form id="add-product-form">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea class="form-control" rows="3" required></textarea>
                </div>
                <div class="flex gap-2">
                    <div class="form-group" style="flex:1;">
                        <label>Price (Rp)</label>
                        <input type="number" class="form-control" required>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>Stock</label>
                        <input type="number" class="form-control" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Save Product</button>
            </form>
        </div>
    </div>

    <script src="js/style.js"></script>
    <script src="js/sellerPage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('seapedia_active_role');
            if (role !== 'Seller') {
                alert('Unauthorized! Only Sellers can access this page.');
                window.location.href = 'index.html';
                return;
            }
            // For UI mock purposes right now:
            document.getElementById('store-form').onsubmit = (e) => {
                e.preventDefault();
                alert('Store created successfully (Mock)!');
                document.getElementById('seller-products-section').style.display = 'block';
                document.getElementById('seller-orders-section').style.display = 'block';
            };
        };
    </script>
</body>
</html>
