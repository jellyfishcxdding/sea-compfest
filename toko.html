<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Profile - SEAPEDIA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/toko.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="navbar-brand">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                SEAPEDIA
            </a>
            <div class="search-bar">
                <input type="text" placeholder="Search in this store...">
                <button><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></button>
            </div>
            <div class="nav-actions" id="nav-links">
                <!-- Injected via JS -->
            </div>
        </div>
    </nav>

    <main class="container mb-4">
        <div class="store-cover">
            <div class="store-profile-header">
                <div class="store-profile-pic" id="store-avatar-container">
                    <!-- Image or Initial -->
                </div>
                <div style="background: white; padding: 24px; border-radius: 16px; box-shadow: var(--box-shadow); flex-grow: 1; margin-bottom: -20px;">
                    <div class="flex justify-between align-center mb-2">
                        <h1 id="store-name-title" style="font-size: 28px; font-weight: 800;">Loading...</h1>
                        <button class="btn btn-outline">Follow Store</button>
                    </div>
                    <p id="store-description" class="text-muted mb-3" style="font-size: 15px;">Welcome to our store!</p>
                    <div id="store-subtitle" class="flex align-center gap-3">
                        <!-- Badges injected -->
                    </div>
                </div>
            </div>
        </div>

        <div class="store-nav mt-4">
            <a href="#" class="active">Products</a>
            <a href="#">Reviews</a>
            <a href="#">About</a>
        </div>

        <h2 class="section-title mb-3">Products from this store</h2>
        <div class="product-grid" id="store-product-grid">
            <!-- Products Injected Here -->
        </div>
    </main>

    <script src="js/style.js"></script>
    <script src="js/toko.js"></script>
    <!-- We keep the JS in style.js for now since it works globally without conflicts, but we will eventually split it -->
</body>
</html>
