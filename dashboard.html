<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SEAPEDIA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .dashboard-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 24px;
            margin-top: 24px;
            margin-bottom: 40px;
        }
        .sidebar {
            background: white;
            border-radius: 8px;
            padding: 16px;
            box-shadow: var(--box-shadow);
            height: fit-content;
        }
        .sidebar-menu {
            list-style: none;
        }
        .sidebar-menu li {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            color: var(--text-dark);
        }
        .sidebar-menu li:hover {
            background: var(--secondary-color);
            color: var(--primary-hover);
        }
        .sidebar-menu li.active {
            background: var(--primary-color);
            color: white;
        }
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: var(--box-shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .stat-title {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-dark);
        }
        .icon-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--secondary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="navbar-brand">SEAPEDIA</a>
            <div class="search-bar" style="max-width: 400px; margin-left: 24px;">
                <input type="text" placeholder="Search...">
                <button><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></button>
            </div>
            <div class="nav-actions" id="nav-links" style="margin-left: auto;">
                <button class="btn btn-outline" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="mb-4 text-center">
                <div style="width: 64px; height: 64px; border-radius: 50%; background: var(--secondary-color); margin: 0 auto 12px auto; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: var(--primary-color);" id="user-initial">U</div>
                <h3 id="user-name" style="font-size: 16px; margin-bottom: 4px;">User</h3>
                <span class="badge" id="user-role" style="background: var(--primary-color); color: white;">Role</span>
            </div>
            <ul class="sidebar-menu" id="sidebar-menu">
                <!-- Dynamically populated based on role -->
            </ul>
        </aside>

        <!-- Main Content -->
        <main>
            <h2 class="section-title" id="dashboard-title">Overview</h2>
            
            <div class="product-grid mb-4" id="stat-container" style="grid-template-columns: repeat(3, 1fr);">
                <!-- Stats injected here -->
            </div>

            <div class="card" id="main-dashboard-content">
                <h3 class="mb-3">Recent Activity</h3>
                <p class="text-muted text-center" style="padding: 40px 0;">Loading your workspace...</p>
            </div>
        </main>
    </div>

    <script src="js/style.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const activeRole = localStorage.getItem('seapedia_active_role');
            const userStr = localStorage.getItem('seapedia_user');
            
            if (!activeRole || !userStr) {
                window.location.href = 'index.html';
                return;
            }
            
            const user = JSON.parse(userStr);
            document.getElementById('user-name').textContent = user.username;
            document.getElementById('user-initial').textContent = user.username.charAt(0).toUpperCase();
            document.getElementById('user-role').textContent = activeRole;
            document.getElementById('dashboard-title').textContent = `${activeRole} Dashboard`;

            const sidebar = document.getElementById('sidebar-menu');
            const stats = document.getElementById('stat-container');
            const content = document.getElementById('main-dashboard-content');

            if (activeRole === 'Buyer') {
                sidebar.innerHTML = `
                    <li class="active" data-href="dashboard.html">Overview</li>
                    <li data-href="myOrder.html">My Orders</li>
                    <li data-href="cart.html">My Cart</li>
                `;
                stats.innerHTML = `
                    <div class="stat-card">
                        <div>
                            <div class="stat-title">Wallet Balance</div>
                            <div class="stat-value">Rp 0</div>
                        </div>
                        <div class="icon-circle"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg></div>
                    </div>
                    <div class="stat-card">
                        <div>
                            <div class="stat-title">Active Orders</div>
                            <div class="stat-value">0</div>
                        </div>
                        <div class="icon-circle"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg></div>
                    </div>
                `;
                content.innerHTML = `
                    <h3 class="mb-3">Simulate Top-up</h3>
                    <div class="flex gap-2">
                        <input type="number" class="form-control" placeholder="Amount (Rp)" style="max-width: 200px;">
                        <button class="btn btn-primary">Top Up Wallet</button>
                    </div>
                `;
            } else if (activeRole === 'Seller') {
                sidebar.innerHTML = `
                    <li class="active" data-href="dashboard.html">Overview</li>
                    <li data-href="sellerPage.html">Manage Store</li>
                `;
                stats.innerHTML = `
                    <div class="stat-card">
                        <div>
                            <div class="stat-title">Total Income</div>
                            <div class="stat-value">Rp 0</div>
                        </div>
                        <div class="icon-circle"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg></div>
                    </div>
                    <div class="stat-card">
                        <div>
                            <div class="stat-title">Active Products</div>
                            <div class="stat-value">0</div>
                        </div>
                        <div class="icon-circle"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg></div>
                    </div>
                `;
                content.innerHTML = `
                    <h3 class="mb-3">Quick Actions</h3>
                    <button class="btn btn-primary" data-href="sellerPage.html">Go to Store Management</button>
                `;
            } else if (activeRole === 'Driver') {
                sidebar.innerHTML = `
                    <li class="active" data-href="dashboard.html">Overview & Jobs</li>
                `;
                stats.innerHTML = `
                    <div class="stat-card">
                        <div>
                            <div class="stat-title">Total Earnings</div>
                            <div class="stat-value">Rp 0</div>
                        </div>
                        <div class="icon-circle"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline></svg></div>
                    </div>
                `;
                content.innerHTML = `
                    <div id="driver-view">
                        <h3 class="mb-3">Available Delivery Jobs</h3>
                        <div id="driver-jobs-container">
                            <div class="text-center" style="padding: 40px;">Loading jobs...</div>
                        </div>
                    </div>
                `;
                loadDriverJobs();
            }
        };

        async function loadDriverJobs() {
            const container = document.getElementById('driver-jobs-container');
            try {
                const res = await fetch('http://127.0.0.1:5000/api/orders/driver');
                const orders = await res.json();
                if (orders.length === 0) {
                    container.innerHTML = `<div class="card text-center" style="padding: 40px;"><h3>No delivery jobs available right now</h3></div>`;
                    return;
                }
                let html = '';
                orders.forEach(order => {
                    html += `
                        <div class="card mb-4" style="border-left: 4px solid var(--primary-color);">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px;">
                                <div>
                                    <h4 style="margin: 0; font-size: 16px;">Order #${order.id}</h4>
                                    <p style="margin: 4px 0; color: var(--text-muted); font-size: 14px;">Store: ${order.store_name}</p>
                                </div>
                                <div style="text-align: right;">
                                    <span style="font-weight: 700; color: var(--primary-color); font-size: 16px;">Fee: Rp ${order.delivery_fee.toLocaleString()}</span>
                                </div>
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 12px;">
                                <span class="badge" style="background: #f39c12; color: white; padding: 4px 8px; border-radius: 4px;">${order.status}</span>
                                <button class="btn btn-primary" onclick="updateJobStatus(${order.id}, 'Sedang Dikirim')">Update Status</button>
                            </div>
                        </div>`;
                });
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = `<div class="card text-center text-danger" style="padding: 40px;">Failed to load jobs.</div>`;
            }
        }

        async function updateJobStatus(orderId, newStatus) {
            try {
                const res = await fetch(`http://127.0.0.1:5000/api/orders/${orderId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                if (res.ok) {
                    alert('Status updated!');
                    loadDriverJobs();
                }
            } catch (e) {
                alert('Failed to update');
            }
        });
    </script>
</body>
</html>
