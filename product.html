<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product - SEAPEDIA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/motion.css">
</head>
<body style="background: var(--background-light);">
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="navbar-brand">SEAPEDIA</a>
            <div class="nav-actions" id="nav-links"></div>
        </div>
    </nav>

    <main class="container mt-4 mb-4">
        <button class="btn btn-outline mb-4" onclick="window.history.back()">&larr; Back</button>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; background: white; padding: 32px; border-radius: 16px; box-shadow: var(--box-shadow);">
            <div id="product-img" style="width: 100%; height: 400px; background: #eee; border-radius: 12px; background-size: cover; background-position: center;"></div>
            
            <div style="display: flex; flex-direction: column; justify-content: center;">
                <h1 id="product-name" style="font-size: 32px; margin-bottom: 8px;">Loading...</h1>
                <p id="product-store" class="text-muted mb-3" style="font-size: 16px;">Sold by: <span></span></p>
                <h2 id="product-price" style="color: var(--primary-color); font-size: 28px; margin-bottom: 16px;"></h2>
                <p id="product-desc" style="line-height: 1.6; color: var(--text-muted); margin-bottom: 24px;"></p>
                
                <div class="flex gap-3 align-center mb-4">
                    <button class="btn" style="width: 40px; height: 40px; border-radius: 50%; font-size:20px; font-weight:bold; background:#f0f0f0;" onclick="updateQty(-1)">-</button>
                    <span id="product-qty" style="font-size: 18px; font-weight: 600;">1</span>
                    <button class="btn" style="width: 40px; height: 40px; border-radius: 50%; font-size:20px; font-weight:bold; background:#f0f0f0;" onclick="updateQty(1)">+</button>
                    <span class="text-muted" style="margin-left: 12px;">Stock: <span id="product-stock">0</span></span>
                </div>
                
                <div class="flex gap-3">
                    <button class="btn btn-primary" style="flex-grow: 1; height: 48px; font-size: 16px;" onclick="addToCart()">Add to Cart</button>
                    <button class="btn btn-outline" style="flex-grow: 1; height: 48px; font-size: 16px; border-color: #e91e63; color: #e91e63;" onclick="addToWishlist()">❤️ Wishlist</button>
                </div>
            </div>
        </div>

        <!-- Product Reviews -->
        <div class="mt-4" style="background: white; padding: 32px; border-radius: 16px; box-shadow: var(--box-shadow);">
            <h2 class="section-title mb-4">Product Reviews</h2>
            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 32px;">
                <!-- Review Form -->
                <div>
                    <h3 style="font-size: 16px; margin-bottom: 8px;">Leave a Review</h3>
                    <p class="text-muted" style="font-size: 14px; margin-bottom: 16px;">You can only review items you have successfully purchased and received.</p>
                    <form id="product-review-form" onsubmit="submitProductReview(event)">
                        <div class="form-group">
                            <label>Rating (1-5)</label>
                            <input type="number" id="review-rating" class="form-control" min="1" max="5" required>
                        </div>
                        <div class="form-group">
                            <label>Comment</label>
                            <textarea id="review-comment" class="form-control" rows="4" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Review</button>
                    </form>
                </div>
                <!-- Review List -->
                <div id="product-review-list" style="display: flex; flex-direction: column; gap: 16px; max-height: 400px; overflow-y: auto; padding-right: 8px;">
                    <p class="text-muted">Loading reviews...</p>
                </div>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>
    <script id="__LOADABLE_REQUIRED_CHUNKS__" type="application/json" crossorigin="anonymous">[0]</script>
    <script defer data-chunk="runtime" src="js/style.js" crossorigin="anonymous"></script>
    <script defer data-chunk="main" src="js/product.js" crossorigin="anonymous"></script>
    <script src="js/motion.js"></script>
</body>
</html>
