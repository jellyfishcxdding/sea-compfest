<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - SEAPEDIA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/myOrder.css">
    <style>
        .order-status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
        }
        .status-dikemas { background: #fff3e0; color: #e65100; }
        .status-menunggu { background: #e3f2fd; color: #1976d2; }
        .status-dikirim { background: #f3e5f5; color: #7b1fa2; }
        .status-selesai { background: #e8f5e9; color: var(--primary-color); }
        .status-dikembalikan { background: #ffebee; color: #d32f2f; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="navbar-brand">SEAPEDIA</a>
            <div class="nav-actions" id="nav-links" style="margin-left: auto;">
                <button class="btn btn-outline" data-href="dashboard.html">Back to Dashboard</button>
            </div>
        </div>
    </nav>

    <main class="container" style="margin-top: 24px; margin-bottom: 40px;">
        <h1 class="section-title mb-4">My Order History</h1>

        <!-- Filters (Mock) -->
        <div class="flex gap-2 mb-4">
            <button class="btn btn-primary">All Orders</button>
            <button class="btn btn-outline">Sedang Dikemas</button>
            <button class="btn btn-outline">Sedang Dikirim</button>
            <button class="btn btn-outline">Selesai</button>
        </div>

        <!-- Order List -->
        <div class="card mb-3">
            <div class="flex justify-between align-center mb-3">
                <div class="flex align-center gap-2">
                    <span style="font-size: 14px; font-weight: 600;">Store: EcoLife</span>
                    <span class="text-muted" style="font-size: 12px;">• 26 Jun 2026</span>
                </div>
                <span class="order-status status-dikemas">Sedang Dikemas</span>
            </div>
            
            <div class="flex gap-3 py-3" style="border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color);">
                <div style="width: 60px; height: 60px; background: #eaeaea; border-radius: 8px;"></div>
                <div style="flex-grow: 1;">
                    <h4 style="margin:0; font-size: 14px; color:var(--text-dark);">Bamboo Toothbrush</h4>
                    <p style="margin:4px 0; color:var(--text-muted); font-size:12px;">2 items</p>
                </div>
                <div style="text-align: right;">
                    <p style="margin:0; font-size: 12px; color:var(--text-muted);">Total Price</p>
                    <p style="margin:4px 0; font-weight:700;">Rp 44,800</p>
                </div>
            </div>

            <div class="flex justify-between align-center mt-3">
                <a href="#" style="font-size: 12px; font-weight: 600;">View Invoice</a>
                <button class="btn btn-primary" disabled style="opacity: 0.5; cursor: not-allowed;">Track Delivery</button>
            </div>
        </div>

        <div class="card mb-3">
            <div class="flex justify-between align-center mb-3">
                <div class="flex align-center gap-2">
                    <span style="font-size: 14px; font-weight: 600;">Store: TeaStore</span>
                    <span class="text-muted" style="font-size: 12px;">• 20 Jun 2026</span>
                </div>
                <span class="order-status status-selesai">Pesanan Selesai</span>
            </div>
            
            <div class="flex gap-3 py-3" style="border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color);">
                <div style="width: 60px; height: 60px; background: #eaeaea; border-radius: 8px;"></div>
                <div style="flex-grow: 1;">
                    <h4 style="margin:0; font-size: 14px; color:var(--text-dark);">Green Tea Matcha</h4>
                    <p style="margin:4px 0; color:var(--text-muted); font-size:12px;">1 item</p>
                </div>
                <div style="text-align: right;">
                    <p style="margin:0; font-size: 12px; color:var(--text-muted);">Total Price</p>
                    <p style="margin:4px 0; font-weight:700;">Rp 66,000</p>
                </div>
            </div>

            <div class="flex justify-between align-center mt-3">
        <h1 class="mb-4" style="font-size: 24px;">My Orders</h1>
        
        <div style="display: flex; gap: 16px; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; overflow-x: auto;" class="order-tabs">
            <button class="btn" style="background:none; color:var(--primary-color); font-weight:700; border-bottom: 2px solid var(--primary-color); border-radius:0;">Semua</button>
            <button class="btn text-muted" style="background:none; border-radius:0;">Sedang Dikemas</button>
            <button class="btn text-muted" style="background:none; border-radius:0;">Sedang Dikirim</button>
            <button class="btn text-muted" style="background:none; border-radius:0;">Selesai</button>
        </div>

        <div id="orders-container">
            <div style="text-align:center; padding: 40px;" class="text-muted">Loading your orders...</div>
        </div>

    </main>

    <script src="js/style.js"></script>
    <script src="js/myOrder.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateNavForAuth();
            loadMyOrders();
        };

        async function loadMyOrders() {
            const container = document.getElementById('orders-container');
            const user = JSON.parse(localStorage.getItem('seapedia_user'));
            const userId = user ? user.id : 1; // Default to dummy user 1 if not logged in

            try {
                const res = await fetch(`http://127.0.0.1:5000/api/orders/buyer/${userId}`);
                const orders = await res.json();

                if (orders.length === 0) {
                    container.innerHTML = `<div class="card text-center" style="padding: 40px;"><h3>You have no orders yet</h3><button class="btn btn-primary mt-3" data-href="index.html">Start Shopping</button></div>`;
                    return;
                }

                let html = '';
                orders.forEach(order => {
                    let statusColor = 'var(--text-muted)';
                    if (order.status === 'Sedang Dikemas') statusColor = '#f39c12';
                    if (order.status === 'Menunggu Pengirim' || order.status === 'Sedang Dikirim') statusColor = '#3498db';
                    if (order.status === 'Pesanan Selesai') statusColor = 'var(--primary-color)';

                    html += `
                    <div class="card mb-4">
                        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 16px;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <span style="font-size: 14px; color: var(--text-muted);">${new Date(order.created_at).toLocaleDateString()}</span>
                                <span class="badge" style="background: ${statusColor}; color: white; font-size: 12px; padding: 4px 8px; border-radius: 4px;">${order.status}</span>
                                <span style="font-weight: 600; font-size: 14px;">${order.store_name}</span>
                            </div>
                        </div>`;

                    order.items.forEach(item => {
                        html += `
                        <div class="flex gap-3 mb-3">
                            <div style="width: 60px; height: 60px; background-image: url('${item.image_url}'); background-size: cover; background-position: center; border-radius: 8px;"></div>
                            <div style="flex-grow: 1;">
                                <h4 style="margin: 0; font-size: 14px;">${item.name}</h4>
                                <p style="margin: 4px 0; color: var(--text-muted); font-size: 12px;">${item.qty} x Rp ${item.price_at_time.toLocaleString()}</p>
                            </div>
                        </div>`;
                    });

                    html += `
                        <div style="border-top: 1px solid var(--border-color); padding-top: 12px; display: flex; justify-content: space-between; align-items: center; margin-top: 16px;">
                            <span style="font-size: 14px; color: var(--text-muted);">Total Belanja:</span>
                            <span style="font-weight: 700; font-size: 16px;">Rp ${order.total_price.toLocaleString()}</span>
                        </div>
                    </div>`;
                });

                container.innerHTML = html;

            } catch (e) {
                console.error(e);
                container.innerHTML = `<div class="card text-center" style="padding: 40px;"><h3>Failed to load orders</h3></div>`;
            }
        });
    </script>
</body>
</html>
